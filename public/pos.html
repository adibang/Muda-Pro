<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Point of Sale – Muda Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/theme.css?t=20260427">
  <link rel="stylesheet" href="/css/dashboard.css?t=20260427">
  <link rel="stylesheet" href="/css/pos.css?t=20260427">
</head>
<body>
  <header class="header">
    <div class="header-left">
      <button class="menu-toggle" id="menuToggle">☰</button>
      <span class="logo-text">🏪 Muda Pro</span>
    </div>
  </header>
  <div id="sidebarContainer"></div>

  <main class="main-content pos-layout" id="mainContent">
    <!-- panel kiri produk -->
    <div class="product-panel">
      <div class="search-bar"><input type="text" id="searchInput" placeholder="Cari produk..."></div>
      <div class="product-grid" id="productGrid"></div>
    </div>
    <!-- panel kanan keranjang -->
    <div class="cart-panel">
      <h2>Keranjang</h2>
      <div class="cart-items" id="cartItems"></div>
      <div class="cart-summary">
        <div class="summary-row"><span>Subtotal</span><span id="subtotal">Rp 0</span></div>
        <div class="summary-row"><span>Diskon (%)</span><input type="number" id="diskonPersen" value="0" min="0" max="100" style="width:60px;"></div>
        <div class="summary-row"><span>Pajak (%)</span><input type="number" id="pajakPersen" value="0" min="0" style="width:60px;"></div>
        <div class="summary-row"><strong>Total</strong><strong id="totalAkhir">Rp 0</strong></div>
      </div>
      <button class="btn-pay" id="btnPay">Bayar</button>
    </div>
  </main>

  <!-- modal bayar sama seperti sebelumnya -->
  <div class="modal-overlay" id="modalBayar">
    <div class="modal-card" style="max-width:420px;">
      <h3>Pembayaran</h3>
      <p>Total: <strong id="bayarTotal"></strong></p>
      <div class="form-group"><label>Dibayar</label><input type="number" id="inputDibayar" step="0.01"></div>
      <p id="kembalianText"></p>
      <div class="modal-actions">
        <button class="btn-cancel" id="btnCancelBayar">Batal</button>
        <button class="btn-save" id="btnConfirmBayar">Selesai</button>
      </div>
    </div>
  </div>

  <script src="/js/pos.js?t=20260427"></script>
  <script>
    fetch('/sidebar.html').then(res => res.text()).then(html => {
      document.getElementById('sidebarContainer').innerHTML = html;
      const script = document.createElement('script');
      script.src = '/js/sidebar.js?t=20260427';
      document.body.appendChild(script);
    });
  </script>
</body>
</html>
