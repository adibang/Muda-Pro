<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Dashboard – Muda Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/theme.css?t=20260428">
  <link rel="stylesheet" href="/css/dashboard.css?t=20260428">
</head>
<body>
  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <button class="menu-toggle" id="menuToggle">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span class="logo-text">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9v12h18V9"/><path d="M3 3h18l-2 6H5L3 3z"/><path d="M9 21V9h6v12"/></svg>
        Muda Pro
      </span>
    </div>
  </header>

  <!-- SIDEBAR CONTAINER -->
  <div id="sidebarContainer"></div>

  <!-- MAIN CONTENT -->
  <main class="main-content" id="mainContent">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon green"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.29 7 12 12 20.71 7"/><line x1="12" y1="22" x2="12" y2="12"/></svg></div>
        <div class="stat-detail"><h3 id="totalStok">0</h3><p>Total Stok Tersedia</p></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon yellow"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
        <div class="stat-detail"><h3 id="stokRendah">0</h3><p>Produk Stok Rendah</p></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon gray"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></div>
        <div class="stat-detail"><h3 id="penjualanHariIni">0</h3><p>Transaksi Hari Ini</p></div>
      </div>
    </div>

    <div class="section">
      <h2><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Stok Menipis</h2>
      <table><thead><tr><th>Produk</th><th>Gudang</th><th>Stok</th></tr></thead><tbody id="lowStockTable"><tr><td colspan="3">Memuat...</td></tr></tbody></table>
    </div>

    <div class="section">
      <h2><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Transaksi Terbaru</h2>
      <table><thead><tr><th>Nomor</th><th>Tanggal</th><th>Pelanggan</th><th>Total</th></tr></thead><tbody id="recentSalesTable"><tr><td colspan="4">Memuat...</td></tr></tbody></table>
    </div>
  </main>

  <script src="/js/sidebar.js?t=20260428"></script>
  <script>
    // Fetch wrapper
    async function fetchAPI(url) {
      const t = localStorage.getItem('accessToken');
      if (!t) { window.location.href = '/index.html'; return null; }
      const res = await fetch(url, { headers: { 'Authorization': `Bearer ${t}` } });
      if (res.status === 401 || res.status === 403) { localStorage.clear(); window.location.href = '/index.html?session=expired'; return null; }
      return res.json();
    }

    // Load data
    async function loadDashboardData() {
      const stockData = await fetchAPI('/api/inventory/stock');
      if (stockData && stockData.status === 'success') {
        let total = 0, low = 0;
        const lowItems = [];
        (stockData.data || []).forEach(item => {
          total += item.stok;
          if (item.stok <= 10) { low++; lowItems.push(item); }
        });
        document.getElementById('totalStok').textContent = total;
        document.getElementById('stokRendah').textContent = low;
        const tbody = document.getElementById('lowStockTable');
        tbody.innerHTML = lowItems.length
          ? lowItems.map(i => `<tr><td>${i.produk_nama || '-'} ${i.nama_varian ? '- '+i.nama_varian : ''}</td><td>${i.gudang_nama || '-'}</td><td>${i.stok}</td></tr>`).join('')
          : '<tr><td colspan="3">Semua stok aman</td></tr>';
      }

      const today = new Date().toISOString().slice(0,10);
      const salesData = await fetchAPI(`/api/sales?start_date=${today}&end_date=${today}`);
      if (salesData && salesData.status === 'success') {
        const transactions = salesData.data || [];
        document.getElementById('penjualanHariIni').textContent = transactions.length;
        const tbody = document.getElementById('recentSalesTable');
        const recent = transactions.slice(0,5);
        tbody.innerHTML = recent.length
          ? recent.map(t => `<tr><td>${t.nomor}</td><td>${t.tanggal}</td><td>${t.customer_nama || '-'}</td><td>Rp ${Number(t.total_akhir).toLocaleString()}</td></tr>`).join('')
          : '<tr><td colspan="4">Belum ada transaksi</td></tr>';
      }
    }

    // Init: load sidebar, lalu jalankan initSidebar, lalu load data
    fetch('/sidebar.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('sidebarContainer').innerHTML = html;
        initSidebar();
        loadDashboardData();
      });
  </script>
</body>
</html>
