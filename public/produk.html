<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produk – Muda Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/theme.css?t=20260427">
  <link rel="stylesheet" href="/css/dashboard.css?t=20260427">
  <link rel="stylesheet" href="/css/produk.css?t=20260427">
</head>
<body>
  <header class="header">
    <div class="header-left">
      <button class="menu-toggle" id="menuToggle">☰</button>
      <span class="logo-text">🏪 Muda Pro</span>
    </div>
  </header>
  <div id="sidebarContainer"></div>

  <main class="main-content" id="mainContent">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <h1>Daftar Produk</h1>
      <button class="btn-add" id="btnAddProduct">+ Tambah Produk</button>
    </div>
    <div class="table-container">
      <table>
        <thead><tr><th>Kode</th><th>Nama</th><th>Harga Jual</th><th>Stok</th><th>Aksi</th></tr></thead>
        <tbody id="productTableBody"></tbody>
      </table>
    </div>
  </main>

  <!-- Modal Produk -->
  <div class="modal-overlay" id="productModal">
    <div class="modal-card" style="max-width:600px;">
      <h3 id="productModalTitle">Tambah Produk</h3>
      <form id="productForm">
        <div class="form-group"><label>Kode</label><input name="kode" required></div>
        <div class="form-group"><label>Nama</label><input name="nama" required></div>
        <div class="form-group"><label>Barcode</label><input name="barcode"></div>
        <div class="form-group"><label>Harga Dasar</label><input type="number" name="harga_dasar" step="0.01"></div>
        <div class="form-group"><label>Harga Jual</label><input type="number" name="harga_jual" step="0.01" required></div>
        <div class="form-group"><label>Berat</label><input type="number" name="berat" step="0.01"></div>
        <div class="form-group"><label>Diskon (%)</label><input type="number" name="diskon" step="0.01" value="0"></div>
        <div class="form-group"><label>Stok Minimal</label><input type="number" name="stok_minimal" value="0"></div>
        <div class="form-group"><label>Kategori</label><select name="kategori_id" id="kategoriSelect"></select></div>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" id="btnCancelProduct">Batal</button>
          <button type="submit" class="btn-save">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal Varian & Satuan -->
  <div class="modal-overlay" id="varianModal">
    <div class="modal-card" style="max-width:700px;">
      <h3>Kelola Varian & Satuan</h3>
      <div id="varianContent"></div>
      <div class="modal-actions">
        <button class="btn-cancel" id="btnCloseVarian">Tutup</button>
      </div>
    </div>
  </div>

  <!-- Modal Harga Bertingkat -->
  <div class="modal-overlay" id="hargaModal">
    <div class="modal-card" style="max-width:500px;">
      <h3>Harga Bertingkat</h3>
      <div id="hargaContent"></div>
      <div class="modal-actions">
        <button class="btn-cancel" id="btnCloseHarga">Tutup</button>
      </div>
    </div>
  </div>

  <script src="/js/produk.js?t=20260427"></script>
  <script>
    fetch('/sidebar.html').then(res => res.text()).then(html => {
      document.getElementById('sidebarContainer').innerHTML = html;
      const script = document.createElement('script');
      script.src = '/js/sidebar.js?t=20260427';
      document.body.appendChild(script);
    });
  </script>
</body>
</html>
