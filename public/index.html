<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Login – Muda Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="/css/login.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <i class="ph ph-storefront logo-icon"></i>
        <h1>Muda Pro</h1>
        <p>Sign in to continue</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Masukkan email" autocomplete="email" inputmode="email" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Masukkan password" autocomplete="current-password" required>
        </div>

        <button type="submit" id="submitBtn" class="btn-login">
          <i class="ph ph-sign-in"></i> Masuk
        </button>

        <div id="errorMessage" class="error-message"></div>
      </form>

      <div class="footer-text">
        Belum punya akun? <a href="/register.html">Daftar</a>
      </div>
    </div>
  </div>

  <script src="/js/login.js"></script>
</body>
</html>
