<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Daftar – Muda Pro</title>
  <link rel="stylesheet" href="/css/login.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <i class="ph ph-user-plus logo-icon"></i>
        <h1>Daftar</h1>
        <p>Buat akun baru</p>
      </div>
      <form id="registerForm">
        <div class="form-group">
          <label for="nama">Nama Lengkap</label>
          <input type="text" id="nama" placeholder="Nama" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Email" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Min. 8 karakter" required>
        </div>
        <button type="submit" id="submitBtn" class="btn-login">
          <i class="ph ph-user-plus"></i> Daftar
        </button>
        <div id="errorMessage" class="error-message"></div>
      </form>
      <div class="footer-text">
        Sudah punya akun? <a href="/index.html">Masuk</a>
      </div>
    </div>
  </div>
  <script src="/js/register.js"></script>
</body>
</html>
